<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Low District</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Low District">
    
    <!-- Icone Ufficiali Low District Culture 2026 -->
    <!-- Aggiunta versione ?v=2 per forzare il refresh della cache su iOS -->
    <link rel="icon" type="image/png" href="https://www.lowdistrict.it/wp-content/uploads/cropped-ico-new-culture-2026-1.png?v=2" sizes="32x32">
    <link rel="icon" type="image/png" href="https://www.lowdistrict.it/wp-content/uploads/cropped-ico-new-culture-2026-1.png?v=2" sizes="192x192">
    <link rel="apple-touch-icon" href="https://www.lowdistrict.it/wp-content/uploads/cropped-ico-new-culture-2026-1.png?v=2">
    
    <!-- Prevenzione zoom su input e stili globali critici -->
    <style>
      input, select, textarea { font-size: 16px !important; }
      body { 
        background-color: #000; 
        margin: 0; 
        padding: 0; 
        /* Forza il colore di sfondo per evitare flash bianchi durante il caricamento */
        -webkit-tap-highlight-color: transparent;
      }
      #root { min-height: 100vh; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
